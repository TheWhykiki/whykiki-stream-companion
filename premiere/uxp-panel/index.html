<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <style>
    body {
      margin: 0;
      padding: 12px;
      font-family: "Adobe Clean", "Segoe UI", sans-serif;
      font-size: 13px;
      color: #e8e8e8;
      background-color: #1e1e1e;
    }
    h1 { font-size: 15px; margin: 0 0 4px 0; }
    .untertitel { color: #9a9a9a; margin: 0 0 12px 0; font-size: 11px; }
    section {
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 10px;
      background-color: #252525;
    }
    section h2 { font-size: 12px; margin: 0 0 8px 0; color: #c8c8c8; text-transform: uppercase; letter-spacing: 0.05em; }
    button {
      background-color: #3375f7;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      margin-right: 6px;
      margin-bottom: 4px;
    }
    button:hover { background-color: #4a86f8; }
    button.sekundaer { background-color: #444; }
    button.sekundaer:hover { background-color: #555; }
    button:disabled { background-color: #333; color: #777; cursor: default; }
    .status { font-size: 11px; color: #9a9a9a; margin-top: 4px; word-break: break-all; }
    .status.ok { color: #6fcf6f; }
    .status.fehler { color: #e06c6c; }
    #log {
      height: 160px;
      overflow-y: auto;
      background-color: #161616;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      padding: 6px;
      font-family: "SF Mono", Consolas, monospace;
      font-size: 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .log-info { color: #b8b8b8; }
    .log-ok { color: #6fcf6f; }
    .log-warnung { color: #e0b34c; }
    .log-fehler { color: #e06c6c; }
    #vorschau { font-size: 11px; color: #b8b8b8; max-height: 90px; overflow-y: auto; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>WhyKiki Stream Companion</h1>
  <p class="untertitel">Premiere-Proof-of-Concept · MVP&nbsp;1</p>

  <section>
    <h2>1 · Timeline laden</h2>
    <button id="btnTimelineLaden">comments_timeline.json laden</button>
    <div id="statusTimeline" class="status">Keine Timeline geladen.</div>
    <div id="vorschau"></div>
  </section>

  <section>
    <h2>2 · MOGRT wählen</h2>
    <button id="btnMogrtWaehlen">MOGRT-Datei wählen</button>
    <div id="statusMogrt" class="status">Kein MOGRT gewählt.</div>
  </section>

  <section>
    <h2>3 · Mapping</h2>
    <button id="btnMappingLaden">Mapping laden</button>
    <button id="btnMappingSpeichern" class="sekundaer">Mapping speichern</button>
    <div id="statusMapping" class="status">Kein Mapping geladen (Standard-Mapping aktiv).</div>
  </section>

  <section>
    <h2>4 · Platzieren</h2>
    <button id="btnPlatzieren" disabled>10 Kommentare in Sequenz platzieren</button>
    <div id="statusPlatzieren" class="status"></div>
  </section>

  <section>
    <h2>Protokoll</h2>
    <div id="log"></div>
    <button id="btnLogSpeichern" class="sekundaer">Protokoll speichern</button>
    <button id="btnLogLeeren" class="sekundaer">Leeren</button>
  </section>

  <script src="main.js"></script>
</body>
</html>
